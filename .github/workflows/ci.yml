name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Build And Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore todo-app.sln

      - name: Build backend and tests
        run: dotnet build todo-app.sln --configuration Release --no-restore

      - name: Test backend with coverage
        run: dotnet test todo-app.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults
