services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - todo_app_postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-todo_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./todo-backend
      target: final
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TodoDatabase: Host=postgres;Port=5432;Database=${POSTGRES_DB:-todo_app};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: ${JWT_ISSUER:-todo-backend}
      Jwt__Audience: ${JWT_AUDIENCE:-todo-frontend}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-change_me_to_a_32_plus_character_secret}
      Jwt__AccessTokenLifetimeMinutes: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      Jwt__RefreshTokenLifetimeDays: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-14}
      Jwt__AccessTokenCookieName: ${JWT_ACCESS_TOKEN_COOKIE_NAME:-todo_auth}
      Jwt__RefreshTokenCookieName: ${JWT_REFRESH_TOKEN_COOKIE_NAME:-todo_refresh}
    ports:
      - "5284:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./todo-frontend
      target: runner
    restart: unless-stopped
    environment:
      BACKEND_API_URL: http://backend:8080
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  todo_app_postgres_data_prod:
