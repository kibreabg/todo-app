services:
  - type: web
    name: todo-api
    runtime: docker
    rootDir: todo-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__TodoDatabase
        sync: false
      - key: Jwt__Issuer
        value: todo-backend
      - key: Jwt__Audience
        value: todo-frontend
      - key: Jwt__SigningKey
        sync: false
      - key: Jwt__AccessTokenLifetimeMinutes
        value: "15"
      - key: Jwt__RefreshTokenLifetimeDays
        value: "14"
      - key: Jwt__AccessTokenCookieName
        value: todo_auth
      - key: Jwt__RefreshTokenCookieName
        value: todo_refresh
