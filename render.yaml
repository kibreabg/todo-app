services:
  - type: web
    name: todo-api
    runtime: dotnet
    rootDir: todo-backend
    buildCommand: dotnet restore && dotnet publish -c Release -o ./out
    startCommand: dotnet ./out/todo-backend.dll --urls http://0.0.0.0:$PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__TodoDatabase
        sync: false
      - key: Jwt__Issuer
        value: todo-backend
      - key: Jwt__Audience
        value: todo-frontend
      - key: Jwt__SigningKey
        sync: false
      - key: Jwt__AccessTokenLifetimeMinutes
        value: "15"
      - key: Jwt__RefreshTokenLifetimeDays
        value: "14"
      - key: Jwt__AccessTokenCookieName
        value: todo_auth
      - key: Jwt__RefreshTokenCookieName
        value: todo_refresh
